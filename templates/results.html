<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hasil Pencarian - {{ location }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main>
        <h1>Hotel di {{ location }}</h1>
        {% if hotels %}
            {% for hotel in hotels %}
            <a href="/hotel/{{ hotel.id }}" class="hotel-card" id="hotel-card-{{ hotel.id }}">
                <h3>{{ hotel.name }}</h3>
                <p>{{ hotel.location }}</p>
            </a>
            {% endfor %}
        {% else %}
            <p class="no-results-message">Tidak ada hotel ditemukan untuk lokasi ini.</p>
        {% endif %}
    </main>
</body>
</html>
